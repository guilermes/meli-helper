<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark px-4 shadow-sm">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-shop me-2"></i>Meli Helper
    </span>

    <div class="d-flex gap-2">
      <a href="cadastro.html" class="btn btn-outline-light btn-sm">
        <i class="bi bi-plus-circle"></i> Cadastro
      </a>
      <a href="config.html" class="btn btn-outline-light btn-sm">
        <i class="bi bi-gear"></i> Config
      </a>
      <button onclick="logout()" class="btn btn-danger btn-sm">
        <i class="bi bi-box-arrow-right"></i> Sair
      </button>
    </div>
  </nav>

  <!-- CONTAINER -->
  <div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h3 class="mb-0 fw-semibold">Lista de Anúncios</h3>
        <small class="text-muted">Gerencie seus produtos cadastrados</small>
      </div>

      <button onclick="buscarAnuncios()" class="btn btn-primary">
        <i class="bi bi-arrow-clockwise"></i> Atualizar
      </button>
    </div>

    <!-- TABELA -->
    <div class="card shadow-sm border-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0" id="tabela">

          <thead class="table-dark text-center">
            <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Marca</th>
            <th>L</th>
            <th>A</th>
            <th>C</th>
            <th>Peso</th>
            <th>Peso Usado</th>
            <th>Custo</th>
            <th>Preço</th>
            <th>Frete</th>
            <th>Lucro</th>
            <th>%</th>
            <th>Ações</th>
          </tr>
          </thead>

          <tbody class="text-center"></tbody>

        </table>
      </div>
    </div>

  </div>

  <!-- MODAL -->
<div class="modal fade" id="modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content border-0 shadow">

      <!-- HEADER -->
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">
          <i class="bi bi-pencil-square me-2"></i>Editar Anúncio
        </h5>
        <button type="button" class="btn-close btn-close-white" onclick="fecharModal()"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">

        <!-- INFO -->
        <div class="mb-4">
          <h6 class="text-primary mb-3">
            <i class="bi bi-info-circle"></i> Informações
          </h6>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nome</label>
              <input id="edit-nome" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">Marca</label>
              <input id="edit-marca" class="form-control">
            </div>
          </div>
        </div>

        <!-- DIMENSÕES -->
        <div class="mb-4">
          <h6 class="text-warning mb-3">
            <i class="bi bi-box"></i> Dimensões
          </h6>

          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Largura (cm)</label>
              <input id="edit-largura" class="form-control">
            </div>

            <div class="col-md-3">
              <label class="form-label">Altura (cm)</label>
              <input id="edit-altura" class="form-control">
            </div>

            <div class="col-md-3">
              <label class="form-label">Comprimento (cm)</label>
              <input id="edit-comprimento" class="form-control">
            </div>

            <div class="col-md-3">
              <label class="form-label">Peso (kg)</label>
              <input id="edit-peso" class="form-control">
            </div>
          </div>
        </div>

        <!-- VALORES -->
        <div>
          <h6 class="text-success mb-3">
            <i class="bi bi-cash-stack"></i> Valores
          </h6>

          <div class="row g-3">

            <div class="col-md-4">
              <label class="form-label">Custo</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input id="edit-custo" class="form-control">
              </div>
            </div>

            <div class="col-md-4">
              <label class="form-label">Preço de Venda</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input id="edit-preco" class="form-control">
              </div>
            </div>

            <div class="col-md-4">
              <label class="form-label">Frete</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input id="edit-frete" class="form-control">
              </div>
            </div>

          </div>
        </div>

      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" onclick="fecharModal()">
          Cancelar
        </button>
        <button class="btn btn-success" onclick="salvarModal()">
          <i class="bi bi-check-lg"></i> Salvar Alterações
        </button>
      </div>

    </div>
  </div>
</div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/api.js"></script>
  <script src="../js/lista.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- NAVBAR PADRÃO -->
<nav class="navbar navbar-dark bg-dark px-4 shadow-sm">

  <!-- LOGO -->
  <a
    href="dashboard.html"
    class="navbar-brand fw-bold d-flex align-items-center"
  >
    <i class="bi bi-shop me-2"></i>
    Meli Helper
  </a>

  <!-- MENU -->
  <div class="d-flex gap-2 flex-wrap">

    <!-- DASHBOARD -->
    <a
      href="dashboard.html"
      class="btn btn-outline-light btn-sm"
    >
      <i class="bi bi-speedometer2"></i>
      Dashboard
    </a>

    <!-- LISTA -->
    <a
      href="lista.html"
      class="btn btn-outline-light btn-sm"
    >
      <i class="bi bi-list-ul"></i>
      Produtos
    </a>

    <!-- CADASTRO -->
    <a
      href="cadastro.html"
      class="btn btn-outline-light btn-sm"
    >
      <i class="bi bi-plus-circle"></i>
      Cadastro
    </a>

    <!-- CONFIG -->
    <a
      href="config.html"
      class="btn btn-outline-light btn-sm"
    >
      <i class="bi bi-gear"></i>
      Config
    </a>

    <!-- SWAGGER -->
    <a
      href="http://localhost:3000/docs"
      target="_blank"
      class="btn btn-outline-info btn-sm"
    >
      <i class="bi bi-file-earmark-code"></i>
      API
    </a>

    <!-- LOGOUT -->
    <button
      onclick="logout()"
      class="btn btn-danger btn-sm"
    >
      <i class="bi bi-box-arrow-right"></i>
      Sair
    </button>

  </div>

</nav>

  <!-- CONTAINER -->
  <div class="container mt-5">

    <div class="row justify-content-center">
      <div class="col-md-8">

        <div class="card shadow border-0">
          <div class="card-body">

            <!-- HEADER -->
            <div class="text-center mb-4">
              <h4 class="fw-semibold mb-1">
                <i class="bi bi-plus-circle me-2"></i>Cadastrar Anúncio
              </h4>
              <small class="text-muted">Preencha os dados do produto</small>
            </div>

            <form id="formAnuncio">

              <!-- INFO -->
              <div class="mb-4">
                <h6 class="text-primary mb-2">
                  <i class="bi bi-info-circle"></i> Informações
                </h6>

                <div class="row g-2">
                  <div class="col-md-6">
                    <input type="text" id="idMercadoLivre" class="form-control" placeholder="ID Mercado Livre (opcional)">
                  </div>
                  <div class="col-md-6">
                    <input type="text" id="nome" class="form-control" placeholder="Nome" required>
                  </div>
                </div>

                <div class="mt-2">
                  <input type="text" id="marca" class="form-control" placeholder="Marca" required>
                </div>
              </div>

              <!-- DIMENSÕES -->
              <div class="mb-4">
                <h6 class="text-warning mb-2">
                  <i class="bi bi-box"></i> Dimensões (cm / kg)
                </h6>

                <div class="row g-2">
                  <div class="col-md-3">
                    <input type="text" id="largura" class="form-control" placeholder="Largura">
                  </div>
                  <div class="col-md-3">
                    <input type="text" id="altura" class="form-control" placeholder="Altura">
                  </div>
                  <div class="col-md-3">
                    <input type="text" id="comprimento" class="form-control" placeholder="Comprimento">
                  </div>
                  <div class="col-md-3">
                    <input type="text" id="peso" class="form-control" placeholder="Peso">
                  </div>
                </div>
              </div>

              <!-- VALORES -->
              <div class="mb-4">
                <h6 class="text-success mb-2">
                  <i class="bi bi-cash-stack"></i> Valores
                </h6>

                <div class="row g-2">
                  <div class="col-md-4">
                    <div class="input-group">
                      <span class="input-group-text">R$</span>
                      <input type="text" id="custo" class="form-control" inputmode="decimal" placeholder="Custo">
                    </div>
                  </div>

                  <div class="col-md-4">
                    <div class="input-group">
                      <span class="input-group-text">R$</span>
                      <input type="text" id="precoVenda" class="form-control" inputmode="decimal" placeholder="Preço">
                    </div>
                  </div>

                  <div class="col-md-4">
                    <div class="input-group">
                      <span class="input-group-text">R$</span>
                      <input type="text" id="frete" class="form-control" inputmode="decimal" placeholder="Frete">
                    </div>
                  </div>
                </div>
              </div>

              <!-- BOTÃO -->
              <div class="d-grid">
                <button type="submit" class="btn btn-success">
                  <i class="bi bi-check-circle"></i> Cadastrar
                </button>
              </div>

            </form>

            <!-- MENSAGEM -->
            <p id="msg" class="mt-3 text-center fw-semibold"></p>

          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/api.js"></script>
  <script src="js/cadastro.js"></script>

  <!-- Logout -->
  <script>
    function logout() {
      localStorage.removeItem("token")
      window.location.href = "index.html"
    }
  </script>

</body>
</html>

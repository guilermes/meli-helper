<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-light d-flex align-items-center justify-content-center vh-100"
  >
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-4">
          <div class="card shadow border-0">
            <div class="card-body p-4">
              <!-- HEADER -->
              <div class="text-center mb-4">
                <h3 class="fw-semibold mb-1">
                  <i class="bi bi-shop me-2"></i>Meli Helper
                </h3>
                <small class="text-muted">Acesse sua conta</small>
              </div>

              <form id="formLogin">
                <!-- EMAIL -->
                <div class="mb-3">
                  <label class="form-label">
                    <i class="bi bi-envelope"></i> Email
                  </label>
                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="Digite seu email"
                    required
                  />
                </div>

                <!-- SENHA -->
                <div class="mb-3">
                  <label class="form-label">
                    <i class="bi bi-lock"></i> Senha
                  </label>
                  <input
                    type="password"
                    id="senha"
                    class="form-control"
                    placeholder="Digite sua senha"
                    required
                  />
                </div>

                <!-- BOTÃO -->
                <div class="d-grid">
                  <button type="submit" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                  </button>
                </div>
              </form>
              <div class="text-center mt-3">
                <small class="text-muted"> Ainda não possui conta? </small>

                <a href="register.html"> Criar conta </a>
              </div>

              <!-- MENSAGEM -->
              <p id="msg" class="text-danger text-center mt-3 fw-semibold"></p>
            </div>
          </div>

          <!-- RODAPÉ -->
          <div class="text-center mt-3">
            <small class="text-muted"> Sistema de gestão de anúncios </small>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/login.js"></script>
  </body>
</html>

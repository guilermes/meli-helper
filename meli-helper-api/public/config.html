<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Configuração</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark px-3 shadow-sm">
    <span class="navbar-brand">
      <i class="bi bi-gear-fill me-2"></i>Configuração
    </span>

    <div>
      <a href="lista.html" class="btn btn-outline-light btn-sm me-2">
        <i class="bi bi-list"></i> Lista
      </a>
      <a href="cadastro.html" class="btn btn-outline-light btn-sm me-2">
        <i class="bi bi-plus-circle"></i> Cadastro
      </a>
      <button onclick="logout()" class="btn btn-danger btn-sm">
        <i class="bi bi-box-arrow-right"></i> Sair
      </button>
    </div>
  </nav>

  <!-- CONTAINER -->
  <div class="container mt-5">

    <div class="row g-4">

      <!-- FORM -->
      <div class="col-lg-6">
        <div class="card shadow border-0">
          <div class="card-body">

            <h5 class="card-title mb-4 text-primary">
              <i class="bi bi-sliders me-2"></i>Regras de Precificação
            </h5>

            <form id="formConfig">

              <div class="mb-3">
                <label class="form-label">Comissão (%)</label>
                <div class="input-group">
                  <span class="input-group-text">%</span>
                  <input type="number" step="0.01" id="comissao" class="form-control">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Imposto (%)</label>
                <div class="input-group">
                  <span class="input-group-text">%</span>
                  <input type="number" step="0.01" id="imposto" class="form-control">
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label">Custo Operacional</label>
                <div class="input-group">
                  <span class="input-group-text">R$</span>
                  <input type="number" step="0.01" id="custoOperacional" class="form-control">
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-save"></i> Salvar Configuração
                </button>
              </div>

            </form>

            <p id="msg" class="mt-3 text-center fw-semibold"></p>

          </div>
        </div>
      </div>

      <!-- CONFIG ATUAL -->
      <div class="col-lg-6">
        <div class="card shadow border-0">
          <div class="card-body">

            <h5 class="card-title mb-4 text-success">
              <i class="bi bi-bar-chart-fill me-2"></i>Configuração Atual
            </h5>

            <div class="list-group">

              <div class="list-group-item d-flex justify-content-between align-items-center">
                <span>
                  <i class="bi bi-percent text-primary me-2"></i>
                  Comissão
                </span>
                <span class="badge bg-primary fs-6">
                  <span id="confComissao">0</span>%
                </span>
              </div>

              <div class="list-group-item d-flex justify-content-between align-items-center">
                <span>
                  <i class="bi bi-receipt text-warning me-2"></i>
                  Imposto
                </span>
                <span class="badge bg-warning text-dark fs-6">
                  <span id="confImposto">0</span>%
                </span>
              </div>

              <div class="list-group-item d-flex justify-content-between align-items-center">
                <span>
                  <i class="bi bi-cash-stack text-success me-2"></i>
                  Custo Operacional
                </span>
                <span class="badge bg-success fs-6">
                  R$ <span id="confCusto">0</span>
                </span>
              </div>

            </div>

          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/config.js"></script>

  <!-- Logout -->
  <script>
    function logout() {
      localStorage.removeItem("token")
      window.location.href = "index.html"
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <title>Meu Perfil</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  >

  <link href="js/layout.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="page-wrapper">

  <div id="sidebar-container"></div>

  <main class="main-content">

<div class="container">

  <div class="row justify-content-center">

    <div class="col-md-8">

      <div class="card shadow border-0">

        <div class="card-body p-4">

          <div class="text-center mb-4">

            <h4 class="fw-semibold mb-1">
              <i class="bi bi-person-circle me-2"></i>
              Meu Perfil
            </h4>

            <small class="text-muted">
              Atualize seus dados (o e-mail não pode ser alterado)
            </small>

          </div>

          <form id="formPerfil">

            <div class="row g-3">

              <div class="col-md-6">

                <label class="form-label">Nome</label>

                <input
                  type="text"
                  id="nome"
                  class="form-control"
                  required
                >

              </div>

              <div class="col-md-6">

                <label class="form-label">Nome da Loja</label>

                <input
                  type="text"
                  id="nomeLoja"
                  class="form-control"
                  required
                >

              </div>

              <div class="col-12">

                <label class="form-label">Email</label>

                <input
                  type="email"
                  id="email"
                  class="form-control bg-light"
                  disabled
                >

              </div>

              <div class="col-md-6">

                <label class="form-label">Nicho</label>

                <select id="nicho" class="form-select">

                  <option value="">Selecionar</option>
                  <option>Moda</option>
                  <option>Eletrônicos</option>
                  <option>Casa</option>
                  <option>Automotivo</option>
                  <option>Pet Shop</option>
                  <option>Esportes</option>
                  <option>Outros</option>

                </select>

              </div>

              <div class="col-md-6">

                <label class="form-label">Nível Seller</label>

                <select id="nivelSeller" class="form-select">

                  <option value="">Selecionar</option>
                  <option>Iniciante</option>
                  <option>Intermediário</option>
                  <option>Avançado</option>

                </select>

              </div>

            </div>

            <hr class="my-4">

            <h6 class="text-muted mb-3">
              Alterar senha (opcional)
            </h6>

            <div class="row g-3">

              <div class="col-md-6">

                <label class="form-label">Nova Senha</label>

                <div class="input-group">

                  <input
                    type="password"
                    id="senha"
                    class="form-control"
                    placeholder="Deixe em branco para manter"
                  >

                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    onclick="toggleSenha('senha', this)"
                    tabindex="-1"
                  >
                    <i class="bi bi-eye"></i>
                  </button>

                </div>

              </div>

              <div class="col-md-6">

                <label class="form-label">Confirmar Nova Senha</label>

                <div class="input-group">

                  <input
                    type="password"
                    id="confirmarSenha"
                    class="form-control"
                    placeholder="Repita a nova senha"
                  >

                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    onclick="toggleSenha('confirmarSenha', this)"
                    tabindex="-1"
                  >
                    <i class="bi bi-eye"></i>
                  </button>

                </div>

                <small class="text-muted">
                  8 caracteres, maiúscula, minúscula e número
                </small>

              </div>

            </div>

            <div class="d-grid mt-4">

              <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle"></i>
                Salvar Alterações
              </button>

            </div>

          </form>

          <p id="msg" class="text-center mt-3 fw-semibold"></p>

        </div>

      </div>

    </div>

  </div>

</div>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/perfil.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Dashboard</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  >

</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark px-4 shadow-sm">

    <span class="navbar-brand fw-bold">
      <i class="bi bi-shop me-2"></i>
      Meli Helper
    </span>

    <div class="d-flex gap-2">

      <a
        href="lista.html"
        class="btn btn-outline-light btn-sm"
      >
        <i class="bi bi-list"></i>
        Lista
      </a>

      <a
        href="cadastro.html"
        class="btn btn-outline-light btn-sm"
      >
        <i class="bi bi-plus-circle"></i>
        Cadastro
      </a>

      <button
        onclick="logout()"
        class="btn btn-danger btn-sm"
      >
        <i class="bi bi-box-arrow-right"></i>
        Sair
      </button>

    </div>

  </nav>

  <!-- CONTAINER -->
  <div class="container mt-4">

    <!-- HEADER -->
    <div class="mb-4">

      <h3 class="fw-semibold mb-0">
        Dashboard Inteligente
      </h3>

      <small class="text-muted">
        Visão geral da operação
      </small>

    </div>

    <!-- KPI CARDS -->
    <div class="row mb-4 g-3">

      <!-- TOTAL -->
      <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

          <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">

              <div>

                <small class="text-muted">
                  Total de Produtos
                </small>

                <h3
                  id="kpiTotal"
                  class="fw-bold mb-0"
                >
                  0
                </h3>

              </div>

              <i class="bi bi-box fs-1 text-primary"></i>

            </div>

          </div>

        </div>

      </div>

      <!-- MARGEM -->
      <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

          <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">

              <div>

                <small class="text-muted">
                  Margem Média
                </small>

                <h3
                  id="kpiMargem"
                  class="fw-bold text-primary mb-0"
                >
                  0%
                </h3>

              </div>

              <i class="bi bi-graph-up fs-1 text-success"></i>

            </div>

          </div>

        </div>

      </div>

      <!-- RUINS -->
      <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

          <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">

              <div>

                <small class="text-muted">
                  Margem Baixa
                </small>

                <h3
                  id="kpiRuins"
                  class="fw-bold text-danger mb-0"
                >
                  0
                </h3>

              </div>

              <i class="bi bi-exclamation-triangle fs-1 text-danger"></i>

            </div>

          </div>

        </div>

      </div>

      <!-- SAUDÁVEIS -->
      <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

          <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">

              <div>

                <small class="text-muted">
                  Produtos Saudáveis
                </small>

                <h3
                  id="kpiBons"
                  class="fw-bold text-success mb-0"
                >
                  0
                </h3>

              </div>

              <i class="bi bi-award fs-1 text-success"></i>

            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- ALERTAS + RANKING -->
    <div class="row g-4">

      <!-- ALERTAS -->
      <div class="col-lg-6">

        <div class="card border-0 shadow-sm h-100">

          <div class="card-header bg-white border-0">

            <h5 class="fw-semibold mb-0">

              <i class="bi bi-bell text-warning me-2"></i>

              Alertas Inteligentes

            </h5>

          </div>

          <div
            class="card-body"
            id="alertasContainer"
          ></div>

        </div>

      </div>

      <!-- RANKING -->
      <div class="col-lg-6">

        <div class="card border-0 shadow-sm h-100">

          <div class="card-header bg-white border-0">

            <h5 class="fw-semibold mb-0">

              <i class="bi bi-trophy text-warning me-2"></i>

              Ranking de Produtos

            </h5>

          </div>

          <div class="card-body">

            <div class="table-responsive">

              <table class="table table-hover align-middle">

                <thead class="table-dark">

                  <tr>

                    <th>#</th>
                    <th>Produto</th>
                    <th>Margem</th>

                  </tr>

                </thead>

                <tbody id="rankingBody"></tbody>

              </table>

            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- RESUMO EXTRA -->
    <div class="row mt-4">

      <div class="col-12">

        <div class="card border-0 shadow-sm">

          <div class="card-body">

            <h5 class="fw-semibold mb-3">

              <i class="bi bi-lightbulb text-primary me-2"></i>

              Insights do Sistema

            </h5>

            <ul
              class="list-group list-group-flush"
              id="insightsContainer"
            ></ul>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/dashboard.js"></script>

</body>
</html>
